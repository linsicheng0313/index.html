<pre id="t"></pre>
<script>
setInterval(()=>{
let d=new Date(),u=window.location.href;
document.getElementById('t').textContent=`{
    time_zone:"China-Hong Kong"
    code:"UTC+8"
    url:"${u}"
    author:"Sicheng Lin"
    time:${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,0)}-${d.getDate().toString().padStart(2,0)} ${d.getHours().toString().padStart(2,0)}:${d.getMinutes().toString().padStart(2,0)}:${d.getSeconds().toString().padStart(2,0)}
}`;
},1000);
</script>
